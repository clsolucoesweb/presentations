<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Apresentação sobre nutrição e estilo de vida, baseada em evidência."
    />
    <title>Nutrição &amp; Estilo de Vida</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=JetBrains+Mono:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="deck" class="deck" aria-live="polite"></main>

    <button class="nav-button nav-button--prev" type="button" aria-label="Slide anterior" data-prev>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M15 5 8 12l7 7" />
      </svg>
    </button>
    <button class="nav-button nav-button--next" type="button" aria-label="Próximo slide" data-next>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="m9 5 7 7-7 7" />
      </svg>
    </button>

    <footer class="deck-footer">
      <div class="progress" aria-hidden="true">
        <span data-progress></span>
      </div>
      <div class="slide-count"><span data-current>01</span>/<span data-total>01</span></div>
      <div class="thumbs" data-thumbs></div>
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
